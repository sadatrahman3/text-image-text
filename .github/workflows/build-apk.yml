name: Build and Release APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.5"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > ImageTextApp/local.properties

      - name: Build
        run: |
          cd ImageTextApp
          gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Img2Txt-debug
          path: ImageTextApp/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Create Release
        if: success() && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Img2Txt ${{ github.ref_name }}"
          body: |
            ## Img2Txt - Image to Text Converter
            Convert images to Base64 text and back, losslessly.
          files: |
            ImageTextApp/app/build/outputs/apk/debug/app-debug.apk
