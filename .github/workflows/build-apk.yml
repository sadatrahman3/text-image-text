name: Build and Release APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: |
          cd ImageTextApp
          rm -rf gradle/wrapper/gradle-wrapper.jar gradlew gradlew.bat
          gradle wrapper --gradle-version 8.5

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build debug APK
        run: |
          cd ImageTextApp
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Img2Txt-debug
          path: ImageTextApp/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Img2Txt ${{ github.ref_name }}"
          body: |
            ## Img2Txt - Image to Text Converter

            Convert images to Base64 text and back, losslessly — perfect for messengers that only support text.

            ### Features
            - **Image → Text**: Convert any image to Base64 text (PNG, lossless)
            - **Text → Image**: Decode Base64 text back to original image
            - **Copy/Share**: Share encoded text via any messenger
            - **Save**: Decoded images can be saved to gallery
            - **No quality loss**: Uses PNG compression at 100% quality
          files: |
            ImageTextApp/app/build/outputs/apk/debug/app-debug.apk
