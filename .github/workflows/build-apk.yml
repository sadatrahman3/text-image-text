name: Build and Release APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ImageTextApp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Install SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME \
            "platforms;android-34" "build-tools;34.0.0" 2>&1 || echo "sdkmanager not at path, trying alternative..."
          # Fallback: try other paths
          find $ANDROID_HOME -name "sdkmanager" -type f 2>/dev/null
          ls -la $ANDROID_HOME/cmdline-tools/ 2>/dev/null

      - name: Create debug keystore
        run: |
          mkdir -p $HOME/.android
          keytool -genkey -v -keystore $HOME/.android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null || true

      - name: Build
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la local.properties
          ls -la $HOME/.android/debug.keystore 2>/dev/null || echo "no debug keystore"
          ./gradlew :app:assembleDebug --no-daemon --stacktrace 2>&1

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Img2Txt-debug
          path: ImageTextApp/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Create Release
        if: success() && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Img2Txt ${{ github.ref_name }}"
          body: |
            ## Img2Txt - Image to Text Converter
            Convert images to Base64 text and back, losslessly.
          files: |
            ImageTextApp/app/build/outputs/apk/debug/app-debug.apk
