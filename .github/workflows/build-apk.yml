name: Build and Release APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ImageTextApp/gradlew

      - name: Build APK
        run: |
          cd ImageTextApp
          ./gradlew assembleDebug assembleRelease --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Img2Txt-debug
          path: ImageTextApp/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: Img2Txt-release-unsigned
          path: ImageTextApp/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Img2Txt ${{ github.ref_name }}"
          body: |
            ## Img2Txt - Image to Text Converter

            Convert images to Base64 text and back, losslessly — perfect for messengers that only support text.

            ### Features
            - **Image → Text**: Convert any image to Base64 text (PNG, lossless)
            - **Text → Image**: Decode Base64 text back to original image
            - **Copy/Share**: Share encoded text via any messenger
            - **Save**: Decoded images can be saved to gallery
            - **No quality loss**: Uses PNG compression at 100% quality

            ### How to use
            1. Open the app
            2. Pick an image → it converts to Base64 text
            3. Copy/share the text via your messenger
            4. On the receiving end, paste the text → decode → save the image

            ### Downloads
            - **`app-debug.apk`** — debug-signed, ready to install
            - **`app-release-unsigned.apk`** — unsigned release (sign before distribution)

            ### Build from source
            ```bash
            git clone https://github.com/sadatrahman3/text-image-text.git
            cd text-image-text/ImageTextApp
            ./gradlew assembleDebug
            ```
          files: |
            ImageTextApp/app/build/outputs/apk/debug/app-debug.apk
            ImageTextApp/app/build/outputs/apk/release/app-release-unsigned.apk
