name: Build and Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ImageTextApp/gradlew

      - name: Build debug APK
        run: |
          cd ImageTextApp
          ./gradlew assembleDebug --no-daemon

      - name: Build release APK (unsigned)
        run: |
          cd ImageTextApp
          ./gradlew assembleRelease --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Img2Txt-debug
          path: ImageTextApp/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: Img2Txt-release-unsigned
          path: ImageTextApp/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create Release
        id: create_release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: "Img2Txt ${{ inputs.version }}"
          body: |
            ## Img2Txt - Image to Text Converter
            
            Convert images to Base64 text and back, losslessly.
            
            ### Features
            - **Image → Text**: Convert any image to Base64 text (PNG, lossless)
            - **Text → Image**: Decode Base64 text back to original image
            - **Copy/Share**: Share encoded text via any messenger
            - **Save**: Decoded images can be saved to gallery
            
            ### How to use
            1. Open the app
            2. Pick an image → it converts to text
            3. Copy/share the text via your messenger
            4. On the receiving side, paste the text → decode → save the image
          files: |
            ImageTextApp/app/build/outputs/apk/debug/app-debug.apk
